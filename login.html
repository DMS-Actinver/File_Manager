<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spine Beat - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login-style.css">
</head>
<body class="login-bg">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card login-card border-0 shadow-lg overflow-hidden">
            <div class="row g-0 h-100">
                
                <div class="col-lg-6 d-none d-lg-flex align-items-center justify-content-center bg-light-blue p-5">
                    <img src="images/huevo.png" alt="Spine Cloud" class="img-fluid floating-img">
                </div>

                <div class="col-lg-6 bg-white p-4 p-md-5 d-flex flex-column justify-content-center">
                    
                    <div class="text-end mb-5">
                        <img src="images/Logo_Spine.svg" alt="Logo Spine Beat" width="180">
                    </div>

                    <div class="login-form-container">
                        <h4 class="text-center fw-bold mb-4">Administrador de Archivos</h4>
                        
                        <form id="formLogin">
                            <div class="mb-4">
                                <label class="form-label text-secondary small fw-bold">Usuario / Email</label>
                                <input type="text" id="usuario" class="form-control custom-input" placeholder="Ingresa tu usuario" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-secondary small fw-bold">Password</label>
                                <input type="password" id="password" class="form-control custom-input" placeholder="Cualquier contraseña funciona" required>
                            </div>

                            <div class="d-grid gap-2 mt-5">
                                <button type="submit" id="btnEntrar" class="btn btn-aceptar fw-bold shadow-sm">Aceptar</button>
                            </div>

                            <div class="text-center mt-4">
                                <a href="#" class="text-decoration-none text-secondary small">Recuperar Contraseña</a>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/login-script.js"></script>
</body>
</html>
